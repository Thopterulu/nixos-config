general {
    lock_cmd = pidof hyprlock || hyprlock       # Avoid starting multiple hyprlock instances
    before_sleep_cmd = loginctl lock-session    # Lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # Turn on display after resume
}

# Dim screen after 5 minutes of inactivity
listener {
    timeout = 300  # 5 minutes
    on-timeout = brightnessctl -s set 10        # Set brightness to 10% (saves current value)
    on-resume = brightnessctl -r                # Restore previous brightness
}

# Lock screen after 10 minutes of inactivity
listener {
    timeout = 600  # 10 minutes
    on-timeout = loginctl lock-session          # Lock the session
}

# Turn off displays after 15 minutes of inactivity
listener {
    timeout = 900  # 15 minutes
    on-timeout = hyprctl dispatch dpms off      # Turn off displays
    on-resume = hyprctl dispatch dpms on        # Turn on displays when activity detected
}
